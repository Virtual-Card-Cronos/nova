[profile.default]
src = "src"
out = "out"
libs = ["lib"]

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]

[fuzz]
runs = 256

[invariant]
runs = 32
depth = 64

[rpc_endpoints]
cronos = "https://evm.cronos.org"
cronos_testnet = "https://evm-t3.cronos.org"

[etherscan]
cronos = { key = "${CRONOSSCAN_API_KEY}" }